name: 🔄 Sync Wiki to GitHub Wiki

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'WIKI.md'
      - '.github/scripts/wiki-sync.ps1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-wiki:
    runs-on: ubuntu-latest
    name: 📖 Update GitHub Wiki Page

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔄 Sync WIKI.md to GitHub Wiki
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $scriptPath = Join-Path '.github' 'scripts' 'wiki-sync.ps1'
          & $scriptPath
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Script exited with code $LASTEXITCODE"
            exit $LASTEXITCODE
          }

      - name: ✅ Log sync completion
        if: success()
        run: echo "✅ GitHub Wiki page updated successfully!"