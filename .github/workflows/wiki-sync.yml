name: 🔄 Sync Wiki to GitHub Wiki

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'WIKI.md'
      - '.github/scripts/wiki-sync.ps1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-wiki:
    runs-on: ubuntu-latest
    name: 📖 Update GitHub Wiki Page

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔍 Debug wiki clone
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $owner = "Achi054"
          $repo = "Jewelix.Docs"
          $wikiUrl = "https://$env:GITHUB_TOKEN@github.com/$owner/$repo.wiki.git"
          
          Write-Host "Testing wiki clone..."
          $result = git clone --depth 1 $wikiUrl /tmp/wiki-test 2>&1
          Write-Host "Exit code: $LASTEXITCODE"
          Write-Host "Output: $result"

      - name: 🔄 Sync WIKI.md to GitHub Wiki
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $scriptPath = Join-Path '.github' 'scripts' 'wiki-sync.ps1'
          & $scriptPath

      - name: ✅ Log sync completion
        if: success()
        run: echo "✅ GitHub Wiki page updated successfully!"