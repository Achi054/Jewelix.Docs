name: 🔄 Sync Wiki to GitHub Wiki

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'WIKI.md'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-wiki:
    runs-on: ubuntu-latest
    name: 📖 Update GitHub Wiki Page

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔄 Sync WIKI.md to GitHub Wiki
        run: |
          # Clone the wiki repo
          git clone "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/Achi054/Jewelix.Docs.wiki.git" wiki

          # Copy WIKI.md to the target page file
          # Filename = wiki page slug + .md
          # /wiki/Jewelix-wikipedia --> Jewelix-wikipedia.md
          cp WIKI.md wiki/Jewelix-wikipedia.md

          cd wiki

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Only commit and push if there are actual changes
          if git diff --quiet; then
            echo "✅ Wiki already up to date — nothing to push."
            exit 0
          fi

          git add Jewelix-wikipedia.md
          git commit -m "Sync WIKI.md -> Jewelix-wikipedia.md"
          git push origin HEAD:master

          echo "✅ Wiki page updated: https://github.com/Achi054/Jewelix.Docs/wiki/Jewelix-wikipedia"

      - name: ✅ Log sync completion
        if: success()
        run: echo "✅ GitHub Wiki page updated successfully!"