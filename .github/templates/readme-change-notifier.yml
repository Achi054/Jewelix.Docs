################################################################################
# TEMPLATE — copy this file to .github/workflows/notify-docs-wiki.yml
#             in each Jewelix source repository.
#
# What it does
# ────────────
# Fires a repository_dispatch event to Jewelix.Docs whenever README.md changes
# on the main/master branch. The receiver workflow (readme-to-wiki.yml) then
# fetches this repo's README and publishes it as a GitHub Wiki page.
#
# Required setup (one-time, per source repo)
# ──────────────────────────────────────────
# 1. Create a classic Personal Access Token (PAT) with `repo` scope.
#    The token owner must have write access to Achi054/Jewelix.Docs.
# 2. Add it as a repository secret named DOCS_WIKI_TOKEN in THIS repo
#    (Settings → Secrets and variables → Actions → New repository secret).
################################################################################

name: 📢 Notify Jewelix.Docs on README Change

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'README.md'

jobs:
  notify-docs-wiki:
    runs-on: ubuntu-latest
    name: 🔔 Dispatch readme-updated to Jewelix.Docs

    steps:
      - name: 📡 Send repository_dispatch to Jewelix.Docs
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DOCS_WIKI_TOKEN }}
          repository: Achi054/Jewelix.Docs
          event-type: readme-updated
          client-payload: |
            {
              "repo": "${{ github.event.repository.name }}",
              "sha":  "${{ github.sha }}",
              "ref":  "${{ github.ref_name }}"
            }
